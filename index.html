<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>エアロバイク 中継点更新アプリ</title>
  <!-- LeafletのCSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1, h2 { color: #333; }
    #map {
      height: 400px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .controls { margin-bottom: 10px; }
    button {
      background-color: #007bff;
      border: none;
      border-radius: 4px;
      color: #fff;
      padding: 8px 12px;
      margin-right: 5px;
      cursor: pointer;
    }
    button:hover { background-color: #0056b3; }
    /* 中継点マーカーの共通デザイン */
    .update-marker {
      background-color: #ff9800;
      border: 2px solid #fff;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      text-align: center;
      line-height: 24px;
      color: #fff;
      font-weight: bold;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
    }
    /* Google Mapsリンク用 */
    #gmapsLinkContainer {
      margin-top: 20px;
      text-align: center;
    }
    #gmapsLink {
      display: inline-block;
      background-color: #28a745;
      color: #fff;
      text-decoration: none;
      padding: 10px 16px;
      border-radius: 4px;
    }
    #gmapsLink:hover { background-color: #218838; }
  </style>
</head>
<body>
  <h1>エアロバイク 中継点更新アプリ</h1>
  <p>
    ※マップ上をクリックして、まず出発地点を設定してください。<br>
    出発後は、クリックするたびに中継点が追加され、出発地点からその中継点までの累積走行距離と更新日時が記録・表示されます。
  </p>
  
  <!-- 地図表示エリア -->
  <div id="map"></div>
  
  <div class="controls">
    <button id="resetBtn">ルートリセット</button>
  </div>
  
  <div>
    <h2>現在の累積走行距離: <span id="totalDistance">0</span> km</h2>
  </div>
  
  <!-- 保存・ロード・CSV出力等の管理エリア -->
  <div class="controls">
    <fieldset>
      <legend>保存済みデータ</legend>
      <button id="saveBtn">保存</button>
      <select id="savedSelect"></select>
      <button id="loadBtn">選択してロード</button>
      <button id="clearDataBtn">全保存データ削除</button>
      <button id="exportCsvBtn">CSV出力</button>
    </fieldset>
  </div>
  
  <!-- Google Maps リンク表示エリア -->
  <div id="gmapsLinkContainer">
    <h2>現在地（Google Mapsリンク）</h2>
    <a id="gmapsLink" href="#" target="_blank">現在地を見る</a>
  </div>
  
  <!-- LeafletのJavaScript -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // 地図の初期化（日本を中心にし、パンの範囲も限定）
    var map = L.map('map', { doubleClickZoom: false }).setView([36.2048, 138.2529], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '© OpenStreetMap'
    }).addTo(map);
    var southWest = L.latLng(24.0, 122.0);
    var northEast = L.latLng(46.0, 153.0);
    map.setMaxBounds(L.latLngBounds(southWest, northEast));
    
    // グローバル変数
    var startMarker = null;           // 出発地点マーカー
    var updateMarkers = [];           // 各中継点のマーカーを保持
    var updates = [];                 // 中継点のデータ {lat, lng, cumulative, datetime}
    var routePolyline = null;         // 出発地点から各中継点までを結ぶポリライン
    var loadedIndex = null;           // ロードしたデータのインデックス（上書き保存用）
    
    // 「現在の累積走行距離」表示更新
    function updateTotalDistanceDisplay() {
      var total = updates.length > 0 ? updates[updates.length-1].cumulative : 0;
      document.getElementById('totalDistance').innerText = total.toFixed(2);
    }
    
    // Google Maps リンク更新（最新の中継点または出発地点が対象）
    function updateGoogleMapLink(latlng) {
      if (!latlng) return;
      var lat = latlng.lat, lng = latlng.lng;
      var url = "https://www.google.com/maps/search/?api=1&query=" + lat + "," + lng;
      var linkElem = document.getElementById("gmapsLink");
      linkElem.href = url;
      linkElem.innerText = "Google Mapsで現在地を見る (" + lat.toFixed(5) + ", " + lng.toFixed(5) + ")";
    }
    
    // マーカーおよびポリラインの再描画
    function redrawRoute() {
      var latlngs = [];
      if (startMarker) {
        latlngs.push(startMarker.getLatLng());
      }
      updateMarkers.forEach(function(m) {
        latlngs.push(m.getLatLng());
      });
      if (routePolyline) {
        routePolyline.setLatLngs(latlngs);
      } else if (latlngs.length > 1) {
        routePolyline = L.polyline(latlngs, {color: '#007bff', weight: 4, opacity: 0.7}).addTo(map);
      }
    }
    
    // マップ上のクリック処理
    map.on('click', function(e) {
      // まだ出発地点が未設定の場合は、クリック位置を出発地点にする
      if (!startMarker) {
        startMarker = L.marker(e.latlng, { draggable: true })
                       .addTo(map)
                       .bindPopup("出発地点")
                       .openPopup();
        updateGoogleMapLink(e.latlng);
        alert("出発地点を設定しました。以降、クリックするたびに中継点が追加され、累積距離が更新されます。");
        return;
      }
      
      // 中継点追加時の処理
      var newLatLng = e.latlng;
      // 最後の地点を取得（出発地点または最後の中継点）
      var lastLatLng = updates.length === 0 ? startMarker.getLatLng() : updateMarkers[updateMarkers.length-1].getLatLng();
      var segmentDistance = lastLatLng.distanceTo(newLatLng) / 1000;  // [m]→[km]
      var previousCumulative = updates.length === 0 ? 0 : updates[updates.length-1].cumulative;
      var newCumulative = previousCumulative + segmentDistance;
      
      // 日時の入力を促す（キャンセルまたは空なら現在日時を使用）
      var inputDatetime = prompt("この中継点の更新日時を入力してください（例: 2025-02-02 14:30）。入力がない場合は現在日時を使用します。", "");
      var datetime = inputDatetime ? inputDatetime : new Date().toLocaleString();
      
      // 中継点マーカーの作成（番号付きで表示）
      var markerContent = "<div class='update-marker'>" + (updates.length+1) + "</div>";
      var updateMarker = L.marker(newLatLng, { icon: L.divIcon({ html: markerContent, className: "" }) })
                          .addTo(map)
                          .bindPopup("中継点 " + (updates.length+1) + "<br>累積距離: " + newCumulative.toFixed(2) + " km<br>更新日時: " + datetime);
      
      updateMarkers.push(updateMarker);
      updates.push({
        lat: newLatLng.lat,
        lng: newLatLng.lng,
        cumulative: newCumulative,
        datetime: datetime
      });
      
      // ポリラインの更新
      redrawRoute();
      // 累積走行距離表示更新
      updateTotalDistanceDisplay();
      // 最新の中継点の位置でGoogle Mapsリンク更新
      updateGoogleMapLink(newLatLng);
    });
    
    // ルート（出発地点および中継点）のリセット
    document.getElementById('resetBtn').addEventListener('click', function() {
      if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
      updateMarkers.forEach(function(m) { map.removeLayer(m); });
      updateMarkers = [];
      updates = [];
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      updateTotalDistanceDisplay();
      document.getElementById("gmapsLink").href = "#";
      document.getElementById("gmapsLink").innerText = "現在地を見る";
      loadedIndex = null;
      alert("ルートをリセットしました。");
    });
    
    // --- 保存・ロード・CSV出力機能 ---
    // 保存済みデータは、出発地点とupdates配列（各中継点の情報）を含むオブジェクトとして保存
    var savedDataList = JSON.parse(localStorage.getItem("aerobikeDataList")) || [];
    
    function updateSavedSelect() {
      var select = document.getElementById("savedSelect");
      select.innerHTML = "";
      var defaultOption = document.createElement("option");
      defaultOption.value = "";
      defaultOption.text = "--選択してください--";
      select.appendChild(defaultOption);
      savedDataList.forEach(function(item, index) {
        var option = document.createElement("option");
        option.value = index;
        option.text = item.title;
        select.appendChild(option);
      });
    }
    
    // 保存処理（ロード済みの場合は上書き保存）
    document.getElementById('saveBtn').addEventListener('click', function() {
      var title = prompt("保存するデータのタイトルを入力してください:");
      if (!title) return;
      var dataObj = {
        title: title,
        start: startMarker ? startMarker.getLatLng() : null,
        updates: updates
      };
      if (loadedIndex !== null) {
        savedDataList[loadedIndex] = dataObj;
        alert("データを上書き保存しました。");
      } else {
        savedDataList.push(dataObj);
        alert("データを保存しました。");
      }
      localStorage.setItem("aerobikeDataList", JSON.stringify(savedDataList));
      updateSavedSelect();
      loadedIndex = null;
    });
    
    // ロード処理
    document.getElementById('loadBtn').addEventListener('click', function() {
      var select = document.getElementById("savedSelect");
      var index = select.value;
      if (index === "") { alert("保存されたデータが選択されていません。"); return; }
      var data = savedDataList[index];
      // 既存のマーカー・ポリラインのクリア
      if (startMarker) { map.removeLayer(startMarker); startMarker = null; }
      updateMarkers.forEach(function(m) { map.removeLayer(m); });
      updateMarkers = [];
      updates = [];
      if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
      
      // 出発地点の再設定
      if (data.start) {
        startMarker = L.marker(data.start, { draggable: true })
                       .addTo(map)
                       .bindPopup("出発地点")
                       .openPopup();
      }
      // 各中継点の再設定
      data.updates.forEach(function(update, idx) {
        var latlng = L.latLng(update.lat, update.lng);
        var markerContent = "<div class='update-marker'>" + (idx+1) + "</div>";
        var updateMarker = L.marker(latlng, { icon: L.divIcon({ html: markerContent, className: "" }) })
                            .addTo(map)
                            .bindPopup("中継点 " + (idx+1) + "<br>累積距離: " + update.cumulative.toFixed(2) + " km<br>更新日時: " + update.datetime);
        updateMarkers.push(updateMarker);
        updates.push(update);
      });
      redrawRoute();
      updateTotalDistanceDisplay();
      // Google Mapsリンクは最新の中継点があればその位置、なければ出発地点
      var linkLatLng = updates.length > 0 ? updateMarkers[updateMarkers.length-1].getLatLng() : (startMarker ? startMarker.getLatLng() : null);
      updateGoogleMapLink(linkLatLng);
      loadedIndex = parseInt(index);
      alert("データをロードしました。（このデータは上書き保存可能です）");
    });
    
    // 全保存データ削除
    document.getElementById('clearDataBtn').addEventListener('click', function() {
      if (confirm("全ての保存データを削除してよろしいですか？") ) {
        savedDataList = [];
        localStorage.removeItem("aerobikeDataList");
        updateSavedSelect();
        alert("保存データを削除しました。");
      }
    });
    
    // CSV出力処理（出発地点と各更新の情報を出力）
    document.getElementById('exportCsvBtn').addEventListener('click', function() {
      if (savedDataList.length === 0) {
        alert("保存されたデータがありません。");
        return;
      }
      var csvContent = "data:text/csv;charset=utf-8,";
      csvContent += "Title,StartLat,StartLng,UpdateNo,Lat,Lng,CumulativeDistance,Datetime\n";
      savedDataList.forEach(function(item) {
        var startLat = item.start ? item.start.lat : "";
        var startLng = item.start ? item.start.lng : "";
        item.updates.forEach(function(upd, idx) {
          var row = [
            item.title,
            startLat,
            startLng,
            idx+1,
            upd.lat,
            upd.lng,
            upd.cumulative,
            upd.datetime
          ].join(",");
          csvContent += row + "\n";
        });
      });
      var encodedUri = encodeURI(csvContent);
      var link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", "aerobike_updates.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });
  </script>
</body>
</html>
